# ============================================
# 🚀 Minimalist tmux Configuration
# ============================================

# ============================================
# ⚙️ General Settings
# ============================================

# True color support
set-option -sa terminal-overrides ",xterm*:Tc"

# Enable mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 50000
set -g default-terminal "tmux-256color"

# Set escape time to zero for better vim experience
set -sg escape-time 0

# Refresh status bar more frequently
set -g status-interval 2

# ============================================
# 🎮 Key Bindings (Unchanged)
# ============================================

# Change prefix to C-z
unbind C-b
set -g prefix C-z
bind C-z send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "✨ Config reloaded! ✨"

# Split panes using | and -
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window with current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Maximize/minimize pane
bind -r m resize-pane -Z

# Enable vi mode for copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Quick window switching
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Easy config edit
bind e new-window -n "tmux.conf" "sh -c '\${EDITOR:-vim} ~/.tmux.conf'"

# Kill pane without confirmation
bind x kill-pane

# Toggle status bar
bind S set-option -g status

# ============================================
# 🎨 Visual Styling - Clean & Simple
# ============================================

# Simple dark gray and white status bar
set -g status-style 'bg=colour235 fg=colour250'

# Clean left side (Session Name)
set -g status-left '#[bg=colour4,fg=colour235,bold] #S #[bg=default] '

# Clean right side (Time and Date)
set -g status-right '#[bg=colour235,fg=colour250] %H:%M | %d %b %Y '

# Clean window tabs
set -g window-status-current-format '#[bg=colour2,fg=colour235,bold] #I:#W '
set -g window-status-format ' #I:#W '

# Subtle pane borders
set -g pane-active-border-style 'fg=colour4'
set -g pane-border-style 'fg=colour235'

# ============================================
# 🔌 Plugins (Functional Only)
# ============================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'omerxx/tmux-floax'

# --- floax settings ---
set -g @floax-bind-menu 'P'

set -g @floax-width '80%'
set -g @floax-height '80%'

set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-change-path 'true'
set -g @floax-session-name 'some-other-session-name'
set -g @floax-title 'floax'
# Auto restore sessions
set -g @continuum-restore 'on'

# ============================================
# 🚦 Initialize TPM
# ============================================
run '~/.tmux/plugins/tpm/tpm'
